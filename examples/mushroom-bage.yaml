type: custom:mushroom-template-badge
entity: sensor.p1_meter_power
icon: |-
  {% if states(config.entity) | float(0) < 0 %}
    mdi:solar-power
  {% else %}
    mdi:flash
  {% endif %}
content: >-
  {% set p = states(config.entity) | float(0) %} {{ p | round(0) }} W {% if p <
  0 %}
    · Gratis elektriciteit
  {% elif p >= 4000 %}
    · Hoog verbruik
  {% elif p >= 1000 %}
    · Middel verbruik
  {% endif %}
color: |-
  {% set p = states(config.entity) | float(0) %}
  {% if p < 0 %}green
  {% elif p < 4000 %}yellow
  {% else %}red{% endif %}
uix:
  style: |
    :host {
      border-radius: 999px;
    }
    div.badge {
      width: 100%;
      min-width: 50px;
      max-width: 260px;
      justify-content: center;
      border-radius: 999px;
      overflow: visible !important;
      position: relative;
      border: 2px solid {{ pulse_border_color(config.entity) }};
      animation: {{ pulse_animation(config.entity) }};
    }
    .content {
      font-weight: 600;
      color: {{ pulse_text_color(config.entity) }} !important;
    }
